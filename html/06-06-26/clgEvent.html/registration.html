<!DOCTYPE html>
<html>
<head>
    <title>Event Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container my-5">

    <h2>Event Registration</h2>

    <div id="msg" class="alert alert-success d-none">
        Registration Successful!
    </div>

    <form id="regForm">

        <div class="mb-3">
            <label>Student Name</label>
            <input type="text" id="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Roll Number</label>
            <input type="text" id="roll" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Branch</label>
            <input type="text" id="branch" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Email</label>
            <input type="email" id="email" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Mobile Number</label>
            <input type="tel" id="mobile" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Event Selection</label>
            <select id="event" class="form-select" required>
                <option value="">Select Event</option>
                <option>Technical Quiz</option>
                <option>Hackathon</option>
                <option>Coding Contest</option>
                <option>Project Expo</option>
            </select>
        </div>

        <button type="submit" class="btn btn-success">
            Register
        </button>

    </form>

    <hr>

    <h3>Stored Registrations</h3>

    <table class="table table-bordered" id="dataTable">
        <thead class="table-dark">
            <tr>
                <th>Name</th>
                <th>Roll</th>
                <th>Branch</th>
                <th>Email</th>
                <th>Mobile</th>
                <th>Event</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

</div>

<script>

function displayRegistrations() {

    let registrations =
        JSON.parse(localStorage.getItem("registrations")) || [];

    let tableBody =
        document.querySelector("#dataTable tbody");

    tableBody.innerHTML = "";

    registrations.forEach(reg => {

        tableBody.innerHTML += `
            <tr>
                <td>${reg.name}</td>
                <td>${reg.roll}</td>
                <td>${reg.branch}</td>
                <td>${reg.email}</td>
                <td>${reg.mobile}</td>
                <td>${reg.event}</td>
            </tr>
        `;
    });
}

document.getElementById("regForm")
.addEventListener("submit", function(e) {

    e.preventDefault();

    const registration = {
        name: document.getElementById("name").value,
        roll: document.getElementById("roll").value,
        branch: document.getElementById("branch").value,
        email: document.getElementById("email").value,
        mobile: document.getElementById("mobile").value,
        event: document.getElementById("event").value
    };

    let registrations =
        JSON.parse(localStorage.getItem("registrations")) || [];

    registrations.push(registration);

    localStorage.setItem(
        "registrations",
        JSON.stringify(registrations)
    );

    sessionStorage.setItem(
        "latestRegistration",
        JSON.stringify(registration)
    );

    document.getElementById("msg")
        .classList.remove("d-none");

    displayRegistrations();

    this.reset();
});

displayRegistrations();

console.log(
    "Local Storage:",
    JSON.parse(localStorage.getItem("registrations"))
);

console.log(
    "Session Storage:",
    JSON.parse(sessionStorage.getItem("latestRegistration"))
);

</script>

</body>
</html>
