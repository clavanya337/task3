<!DOCTYPE html>
<html>
<head>
<title>Survey</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

<h2>Society Survey</h2>

<form>

<label>Cleanliness Satisfaction</label>
<select>
<option>Excellent</option>
<option>Good</option>
<option>Average</option>
<option>Poor</option>
</select>
<br><br>

<label>Security Feedback</label>
<input type="checkbox"> Good Security

<br><br>

<label>Parking Issues</label>
<input type="radio" name="parking"> Yes
<input type="radio" name="parking"> No

<br><br>

<label>Water Supply Feedback</label>
<select>
<option>Excellent</option>
<option>Good</option>
<option>Poor</option>
</select>
<br><br>

<label>Suggestions</label><br>
<textarea rows="5"></textarea>
<br><br>
<button class="btn">Submit Survey</button>
<br><br>

</form>

</div>

</body>
</html>
