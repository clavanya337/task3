<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Election Results</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#003366;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    margin:auto;
    padding:30px 0;
}

.winner{
    background:#d4edda;
    color:#155724;
    padding:15px;
    border-radius:8px;
    margin-bottom:20px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
}

th{
    background:#003366;
    color:white;
}

th,td{
    border:1px solid #ddd;
    padding:12px;
    text-align:center;
}

.progress{
    background:#ddd;
    height:20px;
    border-radius:10px;
    overflow:hidden;
}

.bar{
    height:100%;
    background:#28a745;
}

footer{
    background:#003366;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
<h1>Election Results</h1>
</header>

<section class="container">

<div class="winner">
 Winner: Diya
</div>

<table>
<tr>
<th>Candidate</th>
<th>Votes</th>
<th>Vote %</th>
<th>Progress</th>
</tr>

<tr>
<td>Diya</td>
<td>120</td>
<td>60%</td>
<td>
<div class="progress">
<div class="bar" style="width:60%"></div>
</div>
</td>
</tr>

<tr>
<td>Nagpur Supriya </td>
<td>80</td>
<td>40%</td>
<td>
<div class="progress">
<div class="bar" style="width:40%"></div>
</div>
</td>
</tr>

</table>

</section>

<footer>
 2026 Society Survey & Election Management System
</footer>

</body>
</html>
