<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Card</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-color:#f8f9fa;
        }
        .profile-card{
            max-width:400px;
            margin:auto;
            border-radius:15px;
        }
        .profile-img{
            width:150px;
            height:150px;
            object-fit:cover;
            border:4px solid #0d6efd;
        }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="card profile-card shadow text-center">
        <div class="card-body"> 
            <img
                src="https://static0.howtogeekimages.com/wordpress/wp-content/uploads/2023/08/tiktok-no-profile-picture.png"
                alt="Profile Image"
                class="rounded-circle profile-img mb-3"
            >
            <h3 class="card-title">Santhoshi Kumari</h3>
            <p class="mb-1"><strong>Roll Number:</strong> 2024001</p>
            <p class="mb-1"><strong>Branch:</strong> Computer Science Engineering</p>
            <p class="mb-1"><strong>Email:</strong> santhoshi.kumari@example.com</p>
            <p class="mb-3"><strong>Mobile:</strong> +91 9876543210</p>
            <div class="d-flex justify-content-center gap-2">
                <button class="btn btn-primary">Edit Profile</button>
                <button class="btn btn-outline-secondary">Contact</button>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
