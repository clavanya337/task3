<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f6f9;
}

header{
    background:#003366;
    color:white;
    text-align:center;
    padding: 20px;
}

.container{
    width:90%;
    margin:auto;
    padding:30px 0;
}

.contact-wrapper{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

.form-box,
.info-box{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

input,
textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    background:#003366;
    color:white;
    border:none;
    padding:10px 20px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}

.info-box p{
    margin:10px 0;
}

@media(max-width:768px){
.contact-wrapper{
    grid-template-columns:1fr;
}
}

footer{
    background:#003366;
    color:white;
    text-align:center;
    padding:15px;
    margin-top:20px;
}
</style>
</head>
<body>

<header>
<h1>Contact / Help Center</h1>
</header>

<section class="container">

<div class="contact-wrapper">

<div class="form-box">
<h2>Send Message</h2>

<form>
<input type="text" placeholder="Name" required>

<input type="email" placeholder="Email" required>

<input type="text" placeholder="Subject" required>

<textarea rows="5" placeholder="Message"></textarea>

<button type="submit">Submit</button>
</form>
</div>

<div class="info-box">
<h2>Society Office Details</h2>

<p><strong>Address:</strong><br>
Green Residency Society,<br>
Main Road, Hyderabad
</p>

<p><strong>Email:</strong><br>
office@society.com
</p>

<p><strong>Phone:</strong><br>
+91 9876543210
</p>

<p><strong>Office Timings:</strong><br>
9:00 AM – 6:00 PM
</p>

</div>

</div>

</section>

<!-- <footer>
2026 Society Survey & Election Management System
</footer> -->

</body>
</html>
