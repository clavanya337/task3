<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background:#f8f9fa;
        }
        .card{
            border:none;
            border-radius:12px;
        }
        .stat-number{
            font-size:28px;
            font-weight:bold;
        }
    </style>
</head>
<body>
<div class="container py-4">
    <div class="mb-4">
        <h2>Student Dashboard</h2>
    </div>
    <div class="row g-4 mb-4">
        <div class="col-md-3 col-sm-6">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Total Students</h6>
                    <div class="stat-number text-primary">250</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Present Students</h6>
                    <div class="stat-number text-success">220</div>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Absent Students</h6>
                    <div class="stat-number text-danger">30</div>
                </div>
            </div>
        </div>

        <div class="col-md-3 col-sm-6">
            <div class="card shadow-sm text-center">
                <div class="card-body">
                    <h6>Placements</h6>
                    <div class="stat-number text-warning">180</div>
                </div>
            </div>
        </div>
    </div>
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Student Records</h5>
            <input
                type="text"
                id="searchInput"
                class="form-control w-25"
                placeholder="Search student..."
            >
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle" id="studentTable">
                    <thead class="table-dark">
                        <tr>
                            <th>Roll No</th>
                            <th>Name</th>
                            <th>Branch</th>
                            <th>Attendance</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>101</td>
                            <td>Sharath Kumar</td>
                            <td>CSE</td>
                            <td><span class="badge bg-success">92%</span></td>
                        </tr>
                        <tr>
                            <td>102</td>
                            <td>Santhoshi Kumari</td>
                            <td>ECE</td>
                            <td><span class="badge bg-warning text-dark">78%</span></td>
                        </tr>
                        <tr>
                            <td>103</td>
                            <td>Rahul Nagpur</td>
                            <td>Mechanical</td>
                            <td><span class="badge bg-success">88%</span></td>
                        </tr>
                        <tr>
                            <td>104</td>
                            <td>Diya</td>
                            <td>Civil</td>
                            <td><span class="badge bg-danger">65%</span></td>
                        </tr>
                        <tr>
                            <td>105</td>
                            <td>Supriya</td>
                            <td>CSE</td>
                            <td><span class="badge bg-success">95%</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("searchInput").addEventListener("keyup", function () {
    let filter = this.value.toLowerCase();
    let rows = document.querySelectorAll("#studentTable tbody tr");
    rows.forEach(row => {
        let text = row.textContent.toLowerCase();
        row.style.display = text.includes(filter) ? "" : "none";
    });
});
</script>
</body>
</html>
